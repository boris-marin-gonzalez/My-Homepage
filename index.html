<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Homepage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="villains-bg" aria-hidden="true">
      <img class="villain villain-1" src="villain-1.jpg" alt="" onerror="this.src='being-bond-1.jpg'" />
      <img class="villain villain-2" src="villain-2.jpg" alt="" onerror="this.src='being-bond-1.jpg'" />
      <img class="villain villain-3" src="villain-3.jpg" alt="" onerror="this.src='being-bond-1.jpg'" />
      <img class="villain villain-4" src="villain-4.jpg" alt="" onerror="this.src='being-bond-1.jpg'" />
    </div>

    <main class="card">
      <h1>My name is Bond, James Bond</h1>
      <p>Licensed to thrill.</p>

      <img class="profile-photo" src="being-bond-1.jpg" alt="Photo of me" />

      <div class="button-stack">
        <button type="button" class="contact-btn">Contact Me</button>
        <button type="button" class="about-btn">About Me</button>
        <button type="button" class="shoot-btn">Shoot</button>
      </div>
    </main>

    <div class="red-wipe" id="red-wipe" aria-hidden="true"></div>

    <script>
      const shootButton = document.querySelector(".shoot-btn");
      const redWipe = document.getElementById("red-wipe");

      shootButton?.addEventListener("click", () => {
        redWipe.classList.remove("red-wipe--active");
        void redWipe.offsetWidth;
        redWipe.classList.add("red-wipe--active");
      });

      redWipe?.addEventListener("animationend", () => {
        redWipe.classList.remove("red-wipe--active");
      });
    </script>
  </body>
</html>
